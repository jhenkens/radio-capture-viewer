version: "3.9"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_URL=file:/app/data/radio.db
      - STORAGE_PROVIDER=local
      - STORAGE_LOCAL_BASE_PATH=/app/data/audio
      - CACHE_BASE_PATH=/app/data/cache
      # Uncomment for S3/R2:
      # - STORAGE_PROVIDER=s3
      # - STORAGE_S3_ENDPOINT=https://...
      # - STORAGE_S3_BUCKET=radio-captures
      # - STORAGE_S3_REGION=auto
      # - STORAGE_S3_ACCESS_KEY_ID=...
      # - STORAGE_S3_SECRET_ACCESS_KEY=...
      # Whisper transcription (uncomment to enable):
      # - WHISPER_ENABLED=true
      # - WHISPER_BASE_URL=https://api.openai.com
      # - WHISPER_API_KEY=sk-...
      # - WHISPER_MODEL=gpt-4o-transcribe
      # - WHISPER_PROMPT=...
      # Allow the importer to trigger creation of new channels by name:
      # - CHANNELS_AUTO_CREATE=true
    restart: unless-stopped

  importer:
    build: ./importer
    volumes:
      # Optional: mount a custom config file (otherwise the baked-in defaults + env vars are used)
      # - ./importer/config.yaml:/config/config.yaml:ro
      # Mount the directory where rtl-airband writes audio files
      - /path/to/recordings:/recordings
      # Mount rtl-airband config(s) for channel mapping
      - /etc/rtlsdr-airband.conf:/etc/rtlsdr-airband.conf:ro
    environment:
      - RADIO_CAPTURE_IMPORTER_SERVER_URL=http://app:3000
      - RADIO_CAPTURE_IMPORTER_API_KEY=rcv_your_key_here
      - RADIO_CAPTURE_IMPORTER_RTL_CONFIG=/etc/rtlsdr-airband.conf
    restart: unless-stopped
    depends_on:
      - app

  # Optional: transcriber sidecar (single-threaded faster-whisper)
  # transcriber:
  #   image: johhenkens/radio-capture-viewer:transcriber-latest
  #   environment:
  #     - API_KEY=change-me
  #     - WHISPER_MODEL=small.en
  #     # - DEVICE=cpu
  #     # - COMPUTE_TYPE=int8
  #   volumes:
  #     - hf-cache:/app/hf-cache
  #   restart: unless-stopped
  # Then point the app at it:
  #   WHISPER_BASE_URL=http://transcriber:8000
  #   WHISPER_API_KEY=change-me

  # Optional: speaches.ai sidecar for local transcription
  # speaches:
  #   image: ghcr.io/speaches-ai/speaches:latest-cpu
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - hf-hub-cache:/home/ubuntu/.cache/huggingface/hub
  #   environment:
  #     - SPEACHES__PRELOAD_MODELS=["Systran/faster-whisper-base.en"]
  #   # Or pre-download the model after first start:
  #   # docker exec speaches /home/ubuntu/speaches/.venv/bin/huggingface-cli download Systran/faster-whisper-base.en
  #   restart: unless-stopped

