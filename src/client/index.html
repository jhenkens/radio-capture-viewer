<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio Capture Viewer</title>
  <!-- Webpack injects bundle and styles here -->
</head>
<body x-data="{ sidebarOpen: false }" class="h-full flex flex-col">

  <!-- Top nav -->
  <header class="bg-gray-900 border-b border-gray-800 px-4 py-3 flex items-center gap-3">
    <button
      class="md:hidden text-gray-400 hover:text-gray-200 shrink-0"
      @click="sidebarOpen = !sidebarOpen"
      aria-label="Toggle menu"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <h1 class="text-green-400 font-bold tracking-widest uppercase text-lg">Radio Capture Viewer</h1>
    <div class="ml-auto flex items-center gap-2 shrink-0">
      <span
        class="text-xs"
        :class="$store.app.liveMode ? ($store.app.wsConnected ? 'text-green-400' : 'text-yellow-400') : 'text-yellow-500'"
        x-text="$store.app.liveMode ? ($store.app.wsConnected ? 'LIVE' : 'connecting…') : 'ARCHIVE'"
      ></span>
      <button
        x-show="!$store.app.liveMode"
        @click="$dispatch('range-reset')"
        class="text-gray-500 hover:text-gray-200 text-xs leading-none"
        title="Clear range filter"
      >✕</button>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden relative">

    <!-- Mobile backdrop -->
    <div
      x-show="sidebarOpen"
      @click="sidebarOpen = false"
      class="fixed inset-0 bg-black/60 z-30 md:hidden"
      style="display: none"
    ></div>

    <!-- Sidebar -->
    <aside
      class="fixed inset-y-0 left-0 z-40 w-72 bg-gray-900 border-r border-gray-800 flex flex-col overflow-y-auto transition-transform duration-200 md:relative md:w-64 md:z-auto md:translate-x-0"
      :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
    >

      <!-- Mobile close row -->
      <div class="flex items-center justify-between px-4 py-3 border-b border-gray-800 md:hidden">
        <span class="text-gray-500 text-xs uppercase tracking-wider">Filters</span>
        <button @click="sidebarOpen = false" class="text-gray-400 hover:text-gray-200 text-lg leading-none">✕</button>
      </div>

      <div class="p-4 flex flex-col gap-6">

        <!-- Search + date range (mobile only — hidden on desktop where the bar above the list is used) -->
        <div class="flex flex-col gap-3 md:hidden">
          <input
            type="text"
            placeholder="Search transcripts…"
            :value="$store.app.filterSearch"
            @input.debounce.400ms="$store.app.setFilter('filterSearch', $event.target.value)"
            class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-green-500"
          />
          <div class="flex items-center gap-2">
            <span class="text-gray-500 text-xs w-8 shrink-0">From</span>
            <input
              type="datetime-local"
              :value="$store.app.filterStart"
              @change="$store.app.setFilter('filterStart', $event.target.value)"
              class="flex-1 bg-gray-800 border rounded px-2 py-1.5 text-sm text-gray-100 focus:outline-none focus:border-green-500 [color-scheme:dark]"
              :class="$store.app.filterStart ? 'border-yellow-500' : 'border-gray-700'"
            />
          </div>
          <div class="flex items-center gap-2">
            <span class="text-gray-500 text-xs w-8 shrink-0">To</span>
            <input
              type="datetime-local"
              :value="$store.app.filterEnd"
              @change="$store.app.setFilter('filterEnd', $event.target.value)"
              class="flex-1 bg-gray-800 border rounded px-2 py-1.5 text-sm text-gray-100 focus:outline-none focus:border-green-500 [color-scheme:dark]"
              :class="$store.app.filterEnd ? 'border-yellow-500' : 'border-gray-700'"
            />
          </div>
        </div>

        <!-- System selector -->
        <div x-data="systemSelector" x-init="init()">
          <h2 class="text-xs text-gray-500 uppercase tracking-wider mb-2">System</h2>
          <div x-show="loading" class="text-gray-500 text-xs">Loading…</div>
          <div x-show="error" class="text-red-400 text-xs" x-text="error"></div>
          <div class="flex flex-col gap-1">
            <template x-for="sys in systems" :key="sys.id">
              <button
                @click="selectSystem(sys.id)"
                :class="selectedSystemId === sys.id
                  ? 'bg-green-800 text-green-100'
                  : 'text-gray-300 hover:bg-gray-800'"
                class="text-left px-2 py-1 rounded text-sm transition-colors"
                x-text="sys.name"
              ></button>
            </template>
          </div>
        </div>

        <!-- Channel selector -->
        <div
          x-data="channelSelector"
          @system-selected.window="$store.app.systemId = $event.detail.id; $store.app.systemName = $event.detail.name; $store.app.channelMap = {}; loadChannels($event.detail.id)"
          @channels-loaded.window="$store.app.channelMap = Object.fromEntries($event.detail.channels.map(c => [c.id, c.name]))"
          @channels-changed="$store.app.subscribe($store.app.systemId, $event.detail.ids)"
        >
          <h2 class="text-xs text-gray-500 uppercase tracking-wider mb-2">Channels</h2>
          <div x-show="loading" class="text-gray-500 text-xs">Loading…</div>
          <div x-show="!loading && channels.length === 0" class="text-gray-600 text-xs">No channels</div>
          <div class="flex flex-col gap-1">
            <template x-for="ch in channels" :key="ch.id">
              <button
                @click="$event.metaKey || $event.ctrlKey ? toggleChannel(ch.id) : selectOnly(ch.id)"
                :class="isSelected(ch.id)
                  ? 'bg-blue-800 text-blue-100'
                  : 'text-gray-300 hover:bg-gray-800'"
                class="text-left px-2 py-1 rounded text-sm transition-colors"
                x-text="ch.name"
              ></button>
            </template>
          </div>
        </div>

      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 flex flex-col overflow-hidden min-w-0">

      <!-- Search + date/time range filter (desktop only) -->
      <div class="hidden md:flex px-4 py-2 border-b border-gray-800 bg-gray-900 flex-wrap gap-2">
        <input
          type="text"
          placeholder="Search transcripts…"
          :value="$store.app.filterSearch"
          @input.debounce.400ms="$store.app.setFilter('filterSearch', $event.target.value)"
          class="flex-1 min-w-48 bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-green-500"
        />
        <div class="flex items-center gap-1.5">
          <span class="text-gray-500 text-xs shrink-0">From</span>
          <input
            type="datetime-local"
            :value="$store.app.filterStart"
            @change="$store.app.setFilter('filterStart', $event.target.value)"
            class="bg-gray-800 border rounded px-2 py-1.5 text-sm text-gray-100 focus:outline-none focus:border-green-500 [color-scheme:dark]"
            :class="$store.app.filterStart ? 'border-yellow-500' : 'border-gray-700'"
          />
        </div>
        <div class="flex items-center gap-1.5">
          <span class="text-gray-500 text-xs shrink-0">To</span>
          <input
            type="datetime-local"
            :value="$store.app.filterEnd"
            @change="$store.app.setFilter('filterEnd', $event.target.value)"
            class="bg-gray-800 border rounded px-2 py-1.5 text-sm text-gray-100 focus:outline-none focus:border-green-500 [color-scheme:dark]"
            :class="$store.app.filterEnd ? 'border-yellow-500' : 'border-gray-700'"
          />
        </div>
      </div>

      <!-- Transmission list -->
      <div
        x-data="transmissionList"
        x-init="init()"
        @channels-changed.window="if ($store.app.systemId) load($store.app.systemId, $event.detail.ids)"
        @range-reset.window="onReset()"
        @filter-changed.window="if ($store.app.systemId) load($store.app.systemId, channelIds)"
        class="flex-1 flex flex-col overflow-hidden"
      >
        <div
          class="flex-1 overflow-y-auto pb-16"
          @scroll.passive="lastScrollTime = Date.now()"
        >
          <div x-show="loading && $store.app.transmissions.length === 0" class="p-4 text-gray-500 text-xs">
            Loading…
          </div>
          <div x-show="error" class="p-4 text-red-400 text-xs" x-text="error"></div>
          <div x-show="!loading && $store.app.transmissions.length === 0 && !error" class="p-4 text-gray-600 text-xs">
            No transmissions found. Select a system to begin.
          </div>

          <div class="divide-y divide-gray-800">
            <template x-for="tx in $store.app.transmissions" :key="tx.id">
              <div
                class="px-4 py-3 transition-colors group border-b border-gray-800/50 cursor-pointer"
                :class="$store.app.playingId === tx.id
                  ? 'bg-green-900/25 border-l-2 border-l-green-500'
                  : ($store.app.selectedId === tx.id ? 'bg-gray-800/60 border-l-2 border-l-gray-600' : 'hover:bg-gray-900 active:bg-gray-800')"
                :data-tx-id="tx.id"
                @click="$store.app.selectedId = tx.id"
              >
                <!-- Meta row: desktop = single line, mobile = stacked -->
                <div class="flex items-start justify-between gap-2 mb-1">
                  <!-- Left: system · channel · timestamp -->
                  <div class="flex-1 min-w-0 text-xs">
                    <!-- Desktop: single row -->
                    <div class="hidden sm:flex items-center gap-1.5">
                      <span class="text-green-400 font-medium shrink-0" x-text="$store.app.systemName"></span>
                      <span class="text-gray-600">·</span>
                      <span class="text-blue-400 truncate" x-text="$store.app.channelMap[tx.channel_id] ?? '?'"></span>
                      <span class="text-gray-600">·</span>
                      <span class="text-gray-500 truncate select-none"
                        @mousedown.stop="$el._lp = setTimeout(() => cycleTimestampMode(), 600)"
                        @touchstart.stop.prevent="$el._lp = setTimeout(() => cycleTimestampMode(), 600)"
                        @mouseup="clearTimeout($el._lp)" @mouseleave="clearTimeout($el._lp)"
                        @touchend="clearTimeout($el._lp)" @touchcancel="clearTimeout($el._lp)"
                        x-text="formatTimestamp(tx)" title="Long-press to cycle: date · epoch · id"></span>
                    </div>
                    <!-- Mobile: stacked -->
                    <div class="sm:hidden flex flex-col gap-0.5">
                      <span class="text-green-400 font-medium" x-text="$store.app.systemName"></span>
                      <span class="text-blue-400 truncate" x-text="$store.app.channelMap[tx.channel_id] ?? '?'"></span>
                      <span class="text-gray-500 select-none"
                        @mousedown.stop="$el._lp = setTimeout(() => cycleTimestampMode(), 600)"
                        @touchstart.stop.prevent="$el._lp = setTimeout(() => cycleTimestampMode(), 600)"
                        @mouseup="clearTimeout($el._lp)" @mouseleave="clearTimeout($el._lp)"
                        @touchend="clearTimeout($el._lp)" @touchcancel="clearTimeout($el._lp)"
                        x-text="formatTimestamp(tx)" title="Long-press to cycle: date · epoch · id"></span>
                    </div>
                  </div>
                  <!-- Right: actions (always visible) -->
                  <div class="flex items-center gap-1.5 shrink-0">
                    <span class="text-gray-500 text-xs font-mono" x-text="formatDuration(tx.duration_ms)"></span>
                    <a
                      :href="`/api/transmissions/${tx.id}/audio`"
                      :download="`${new Date(tx.recorded_at).toISOString().slice(0,19).replace('T','-').replace(/:/g,'-')}.mp3`"
                      class="text-gray-600 group-hover:text-blue-400 w-6 h-6 flex items-center justify-center rounded hover:bg-gray-800 transition-colors"
                      @click.stop
                      title="Download"
                    >
                      <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v9.586l2.293-2.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 111.414-1.414L9 12.586V3a1 1 0 011-1zM3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"/></svg>
                    </a>
                    <button
                      class="w-6 h-6 flex items-center justify-center rounded hover:bg-gray-800 transition-colors"
                      :class="$store.app.playingId === tx.id && $store.app.playing ? 'text-yellow-400' : 'text-green-400'"
                      @click.stop="$store.app.selectedId = tx.id; $store.app.playingId === tx.id ? $dispatch('toggle-playback') : $dispatch('play-transmission', tx)"
                      :title="$store.app.playingId === tx.id && $store.app.playing ? 'Pause' : ($store.app.playingId === tx.id ? 'Resume' : 'Play')"
                    >
                      <svg x-show="$store.app.playingId === tx.id && $store.app.playing" class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><rect x="4" y="3" width="4" height="14" rx="1"/><rect x="12" y="3" width="4" height="14" rx="1"/></svg>
                      <svg x-show="!($store.app.playingId === tx.id && $store.app.playing)" class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11v11.78a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/></svg>
                    </button>
                  </div>
                </div>

                <!-- Transcript -->
                <div
                  x-show="tx.transcript"
                  class="text-gray-300 text-xs leading-relaxed line-clamp-2"
                  x-text="tx.transcript"
                ></div>
                <div
                  x-show="!tx.transcript"
                  class="text-gray-600 text-xs italic"
                >No transcript</div>
              </div>
            </template>
          </div>

          <!-- Infinite scroll sentinel -->
          <div id="tx-list-sentinel" x-show="hasMore" class="h-1"></div>

          <!-- Load more fallback button -->
          <div x-show="hasMore" class="p-4">
            <button
              @click="loadMore()"
              :disabled="loadingMore"
              class="w-full py-2 bg-gray-800 hover:bg-gray-700 text-gray-400 text-xs rounded transition-colors disabled:opacity-50"
            >
              <span x-show="!loadingMore">Load more</span>
              <span x-show="loadingMore">Loading…</span>
            </button>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- Floating audio player bar -->
  <div
    x-data="audioPlayer"
    x-init="init()"
    @play-transmission.window="play($event.detail)"
    @stop-playback.window="stop()"
    @toggle-playback.window="playing ? pause() : resume()"
    class="fixed bottom-0 inset-x-0 bg-gray-900 border-t border-gray-700 z-50"
  >
    <!-- Progress bar / seek -->
    <div
      class="h-4 bg-gray-800 w-full cursor-pointer group"
      @click="seek(($event.clientX - $el.getBoundingClientRect().left) / $el.offsetWidth)"
    >
      <div
        class="h-full bg-green-500 transition-none pointer-events-none group-hover:bg-green-400"
        :style="'width: ' + (audioDuration > 0 ? (currentTime / audioDuration * 100).toFixed(2) : 0) + '%'"
      ></div>
    </div>

    <!-- Controls -->
    <div class="px-4 py-2 flex flex-wrap items-center gap-x-3 gap-y-1.5">
      <!-- Row 1: channel info (full width on mobile) -->
      <div class="w-full sm:w-auto sm:flex-1 min-w-0">
        <div x-show="!currentTransmission" class="text-gray-600 text-xs">No audio playing</div>
        <div x-show="currentTransmission" class="text-xs truncate">
          <span class="text-green-400" x-text="currentTransmission ? ($store.app.channelMap[currentTransmission.channel_id] ?? '?') : ''"></span>
          <span class="text-gray-600 mx-1 hidden sm:inline">·</span>
          <span class="text-gray-400 hidden sm:inline" x-text="currentTransmission ? new Date(currentTransmission.recorded_at).toLocaleString() : ''"></span>
        </div>
      </div>
      <!-- Row 2 on mobile: time (left) + buttons (right) -->
      <span
        x-show="audioDuration > 0"
        class="text-gray-500 text-xs font-mono shrink-0 mr-auto sm:mr-0"
        x-text="formatProgress(currentTime) + ' / ' + formatProgress(audioDuration)"
      ></span>
      <button
        @click="$store.app.toggleAutoplay()"
        :class="$store.app.autoplay ? 'bg-gray-300 text-gray-900' : 'bg-gray-700 text-gray-500'"
        class="px-2 sm:px-3 py-1 rounded text-xs font-semibold transition-colors shrink-0"
        x-text="$store.app.autoplay ? 'Auto ON' : 'Auto OFF'"
      ></button>
      <button
        @click="playing ? pause() : resume()"
        :disabled="!currentTransmission"
        class="px-2 sm:px-3 py-1 rounded text-xs transition-colors shrink-0 disabled:opacity-30 disabled:cursor-not-allowed"
        :class="playing ? 'bg-yellow-700 text-yellow-100 hover:enabled:bg-yellow-600' : 'bg-green-700 text-green-100 hover:enabled:bg-green-600'"
        x-text="playing ? 'Pause' : 'Resume'"
      ></button>
    </div>
  </div>

</body>
</html>
