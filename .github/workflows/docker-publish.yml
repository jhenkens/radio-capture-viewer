name: ci

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"

env:
  DOCKER_OWNER: johhenkens

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta (app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: "${{ env.DOCKER_OWNER }}/${{ github.event.repository.name }}"
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push app
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Docker meta (importer)
        id: meta-importer
        uses: docker/metadata-action@v5
        with:
          images: "${{ env.DOCKER_OWNER }}/${{ github.event.repository.name }}"
          tags: |
            type=raw,value=importer-latest,enable={{is_default_branch}}
            type=semver,pattern=importer-{{version}}
            type=semver,pattern=importer-{{major}}.{{minor}}
            type=semver,pattern=importer-{{major}}

      - name: Build and push importer
        uses: docker/build-push-action@v6
        with:
          context: ./importer
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-importer.outputs.tags }}
          labels: ${{ steps.meta-importer.outputs.labels }}
          cache-from: type=gha,scope=importer
          cache-to: type=gha,mode=max,scope=importer
